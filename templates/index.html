<!DOCTYPE html>
<html>
<head>
    <title>Touchwood Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#fff5f5;
        }

        .container{
            width:90%;
            margin:auto;
            text-align:center;
            padding-top:50px;
        }

        .logo{
            color:#cc0000;
            font-size:50px;
            font-weight:bold;
            margin-bottom:20px;
        }

        img{
            width:100%;
            border-radius:20px;
        }

        h1{
            font-size:45px;
            margin-top:40px;
        }

        input{
            width:100%;
            padding:20px;
            margin-top:20px;
            border-radius:15px;
            border:2px solid #ddd;
            font-size:20px;
        }

        .btn{
            width:100%;
            padding:20px;
            margin-top:25px;
            border:none;
            border-radius:15px;
            background:#cc0000;
            color:white;
            font-size:25px;
            font-weight:bold;
        }

        .register{
            margin-top:30px;
            font-size:22px;
        }

        a{
            color:#cc0000;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="logo">Touchwood</div>

    <h1>Login</h1>

    <form method="POST">

        <input type="email" name="email" placeholder="Email">

        <input type="password" name="password" placeholder="Password">

        <button class="btn">Login</button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="/register">Create Account</a>
    </div>

</div>

</body>
</html>
