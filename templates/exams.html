<!DOCTYPE html>
<html>
<head>
    <title>Available Exams</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            padding:20px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
        }

        a{
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

    </style>

</head>
<body>

<h1>Available Exams</h1>

{% for exam in exams %}

<div class="card">

    <h2>{{ exam.title }}</h2>

    <p><b>Subject:</b> {{ exam.subject }}</p>

    <p><b>Teacher:</b> {{ exam.teacher }}</p>

    <a href="/take-exam/{{ exam.id }}">Start Exam</a>

</div>

{% endfor %}

</body>
</html>
