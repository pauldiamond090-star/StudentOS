<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard - StudentOS</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f7fc;
        }

        .navbar{
            background:#0f172a;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            padding:30px;
        }

        .welcome{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3{
            color:#1e3a8a;
            margin-top:0;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            background:#2563eb;
            color:white;
            padding:10px 18px;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>
