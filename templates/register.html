<!DOCTYPE html>
<html>
<head>
    <title>StudentOS Register</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            width:90%;
            max-width:400px;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        h1{
            color:#1e3a8a;
            font-size:38px;
            margin-bottom:20px;
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:15px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:20px;
            font-weight:bold;
        }

        button:hover{
            background:#1d4ed8;
        }

        .show{
            text-align:left;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>StudentOS Registration</h1>

<form method="POST">

<input type="text"
name="fullname"
placeholder="Full Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
id="password"
name="password"
placeholder="Password"
required
minlength="8"
pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$"
title="Password must contain letters and numbers">

<div class="show">
<input type="checkbox" onclick="showPassword()"> Show Password
</div>

<select name="role">

<option value="student">Student</option>

<option value="teacher">Teacher</option>

</select>

<button type="submit">
Register
</button>

</form>

</div>

<script>

function showPassword(){

    var x = document.getElementById("password");

    if(x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }

}

</script>

</body>
</html>
