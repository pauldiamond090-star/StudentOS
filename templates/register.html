<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h1>Create Account</h1>

<form action="/register" method="post">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <select name="role">

        <option value="student">
            Student
        </option>

        <option value="teacher">
            Teacher
        </option>

        <option value="admin">
            Admin
        </option>

    </select>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="/">
Back to Login
</a>

</body>
</html>
