
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Grade</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:600px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#38bdf8;
        }

        label{
            display:block;
            margin-bottom:8px;
            margin-top:20px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#334155;
            color:white;
            font-size:16px;
            outline:none;
        }

        textarea{
            min-height:120px;
            resize:none;
        }

        button{
            width:100%;
            margin-top:30px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#22c55e;
            color:white;
            font-size:18px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#16a34a;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Add Student Grade</h1>

    <form method="POST">

        <label>Select Student</label>

        <select name="student" required>

            <option value="">Choose Student</option>

            {% for student in students %}

                <option value="{{ student.fullname }}">
                    {{ student.fullname }}
                </option>

            {% endfor %}

        </select>

        <label>Subject</label>

        <input
            type="text"
            name="subject"
            placeholder="Enter subject"
            required
        >

        <label>Score</label>

        <input
            type="number"
            name="score"
            placeholder="Enter score"
            required
        >

        <label>Remark</label>

        <textarea
            name="remark"
            placeholder="Teacher remark..."
            required
        ></textarea>

        <button type="submit">
            Save Grade
        </button>

    </form>

</div>

</body>
  </html>
