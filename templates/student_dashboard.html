<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .dashboard{
            width:100%;
            max-width:900px;
            text-align:center;
        }

        .title{
            font-size:50px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .welcome{
            font-size:22px;
            margin-bottom:40px;
            color:#cbd5e1;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .card{
            background:#1e293b;
            padding:40px 20px;
            border-radius:20px;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .card:hover{
            transform:translateY(-8px);
            background:#2563eb;
        }

        .card h2{
            font-size:28px;
            margin-bottom:15px;
        }

        .card p{
            font-size:16px;
            color:#e2e8f0;
        }

        a{
            text-decoration:none;
            color:white;
        }

    </style>
</head>

<body>

    <div class="dashboard">

        <div class="title">
            StudentOS
        </div>

        <div class="welcome">
            Welcome {{ username }}
        </div>

        <div class="grid">

            <a href="#">
                <div class="card">
                    <h2>📚 Homework</h2>
                    <p>View assignments</p>
                </div>
            </a>

            <a href="#">
                <div class="card">
                    <h2>🕒 Timetable</h2>
                    <p>Check class schedule</p>
                </div>
            </a>

            <a href="#">
                <div class="card">
                    <h2>📊 Results</h2>
                    <p>View exam scores</p>
                </div>
            </a>

            <a href="#">
                <div class="card">
                    <h2>💬 Chat</h2>
                    <p>Talk with teachers</p>
                </div>
            </a>

        </div>

    </div>

</body>
</html>
