<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f7fb;
            margin:0;
            padding:0;
        }

        .navbar{
            background:#1e3a8a;
            color:white;
            padding:15px;
            font-size:22px;
            font-weight:bold;
        }

        .container{
            padding:20px;
        }

        .welcome{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        a{
            text-decoration:none;
            color:#1e3a8a;
            font-weight:bold;
        }
    </style>
</head>

<body>

    <div class="navbar">
        StudentOS Dashboard
    </div>

    <div class="container">

        <div class="welcome">
            <h2>Welcome {{ username }}</h2>
            <p>Your school portal is active.</p>
        </div>

        <div class="grid">

            <div class="card">
                <h3>Homework</h3>
                <a href="/homework">Open</a>
            </div>

            <div class="card">
                <h3>Timetable</h3>
                <a href="/timetable">Open</a>
            </div>

            <div class="card">
                <h3>Results</h3>
                <a href="/results">Open</a>
            </div>

            <div class="card">
                <h3>Chat</h3>
                <a href="/chat">Open</a>
            </div>

        </div>

    </div>

</body>
</html>
