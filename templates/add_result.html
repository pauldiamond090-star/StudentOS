<!DOCTYPE html>
<html>
<head>
    <title>Add Result</title>
</head>
<body>

<h1>Add Student Result</h1>

<form method="POST">

    <input type="text"
           name="student_name"
           placeholder="Student Name">

    <br><br>

    <input type="text"
           name="subject"
           placeholder="Subject">

    <br><br>

    <input type="number"
           name="score"
           placeholder="Score">

    <br><br>

    <button type="submit">
        Save Result
    </button>

</form>

</body>
</html>
