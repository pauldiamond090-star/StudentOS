<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNova Chat Room</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        .header{
            background:#1e293b;
            padding:20px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            border-bottom:2px solid #334155;
        }

        .chat-container{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .message{
            background:#1e293b;
            padding:15px;
            border-radius:15px;
            margin-bottom:15px;
        }

        .sender{
            font-weight:bold;
            color:#38bdf8;
            margin-bottom:8px;
        }

        .role{
            font-size:12px;
            color:#94a3b8;
            margin-bottom:10px;
        }

        .text{
            font-size:16px;
            line-height:1.5;
        }

        .chat-form{
            background:#1e293b;
            padding:15px;
            display:flex;
            gap:10px;
            border-top:2px solid #334155;
        }

        .chat-form input{
            flex:1;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#334155;
            color:white;
            outline:none;
            font-size:16px;
        }

        .chat-form button{
            padding:15px 25px;
            border:none;
            border-radius:12px;
            background:#22c55e;
            color:white;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        .chat-form button:hover{
            background:#16a34a;
        }

        .empty{
            text-align:center;
            margin-top:50px;
            color:#94a3b8;
            font-size:18px;
        }

    </style>
</head>
<body>

    <div class="header">
        EduNova Classroom Chat
    </div>

    <div class="chat-container">

        {% if messages %}

            {% for msg in messages %}

                <div class="message">

                    <div class="sender">
                        {{ msg.sender }}
                    </div>

                    <div class="role">
                        {{ msg.role }}
                    </div>

                    <div class="text">
                        {{ msg.message }}
                    </div>

                </div>

            {% endfor %}

        {% else %}

            <div class="empty">
                No messages yet.
            </div>

        {% endif %}

    </div>

    <form class="chat-form" method="POST">

        <input
            type="text"
            name="message"
            placeholder="Type your message..."
            required
        >

        <button type="submit">
            Send
        </button>

    </form>

</body>
  </html>
