<!DOCTYPE html>
<html>
<head>
    <title>Create Exam</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:30px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input, textarea, select{
            width:100%;
            padding:15px;
            margin-top:10px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
        }

        button{
            width:100%;
            padding:15px;
            background:#22c55e;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Create CBT Exam</h1>

    <form method="POST">

        <input type="text" name="title" placeholder="Exam Title" required>

        <input type="text" name="subject" placeholder="Subject" required>

        <textarea name="question" placeholder="Question" required></textarea>

        <input type="text" name="option_a" placeholder="Option A" required>

        <input type="text" name="option_b" placeholder="Option B" required>

        <input type="text" name="option_c" placeholder="Option C" required>

        <input type="text" name="option_d" placeholder="Option D" required>

        <select name="correct_answer" required>
            <option value="">Select Correct Answer</option>
            <option value="A">Option A</option>
            <option value="B">Option B</option>
            <option value="C">Option C</option>
            <option value="D">Option D</option>
        </select>

        <button type="submit">Publish Exam</button>

    </form>

</div>

</body>
</html>
