<!DOCTYPE html>
<html>
<head>
    <title>StudentOS</title>
</head>
<body>

<h1>StudentOS Login</h1>

<form action="/login" method="post">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register">
Create Account
</a>

</body>
</html>
