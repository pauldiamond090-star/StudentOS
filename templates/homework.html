<!DOCTYPE html>
<html>
<head>
    <title>Homework Upload</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            padding:30px;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:20px;
            max-width:500px;
            margin:auto;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#cc0000;
            font-size:40px;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:20px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:18px;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            background:#0033cc;
            color:white;
            border:none;
            border-radius:10px;
            font-size:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Upload Homework</h1>

        <form method="POST" enctype="multipart/form-data">

            <input type="text"
                   name="subject"
                   placeholder="Subject"
                   required>

            <input type="file"
                   name="homework"
                   required>

            <button type="submit">
                Upload Homework
            </button>

        </form>

    </div>

</body>
      </html>
