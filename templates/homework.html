<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Homework</title>

<style>

body{
    background:#071739;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.card{
    background:#13264d;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:#0d1b36;
    color:white;
}

button{
    background:#ff3b3b;
    color:white;
    border:none;
    padding:15px;
    width:100%;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.subject{
    color:#8fb3ff;
    margin-top:10px;
}

.teacher{
    margin-top:15px;
    color:gray;
    font-size:14px;
}

</style>
</head>
<body>

<h1>📚 Homework</h1>

{% if role == "teacher" %}

<div class="card">

<form method="POST">

<input type="text"
name="title"
placeholder="Homework Title"
required>

<input type="text"
name="subject"
placeholder="Subject"
required>

<textarea
name="description"
placeholder="Homework Description"
rows="5"
required></textarea>

<button type="submit">
Upload Homework
</button>

</form>

</div>

{% endif %}

{% for hw in homeworks %}

<div class="card">

<h2>{{ hw.title }}</h2>

<div class="subject">
{{ hw.subject }}
</div>

<p>
{{ hw.description }}
</p>

<div class="teacher">
Uploaded by {{ hw.teacher }}
</div>

</div>

{% endfor %}

</body>
    </html>
