<!DOCTYPE html>
<html>
<head>

    <title>Nexora Admin</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f5f5f5;
            display:flex;
        }

        /* SIDEBAR */

        .sidebar{
            width:260px;
            height:100vh;
            background:#1d0000;
            color:white;
            position:fixed;
            left:0;
            top:0;
            padding:30px 20px;
        }

        .logo{
            font-size:40px;
            font-weight:bold;
            margin-bottom:50px;
        }

        .menu{
            margin-top:20px;
        }

        .menu a{
            display:block;
            color:white;
            text-decoration:none;
            padding:18px;
            border-radius:15px;
            margin-bottom:15px;
            transition:0.3s;
            font-size:18px;
        }

        .menu a:hover{
            background:#a00000;
        }

        /* MAIN */

        .main{
            margin-left:260px;
            width:100%;
            padding:30px;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .top h1{
            font-size:40px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:40px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:25px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .card h2{
            font-size:40px;
            color:#b30000;
        }

        .card p{
            margin-top:10px;
            color:#666;
            font-size:18px;
        }

        .section{
            margin-top:50px;
        }

        .section-title{
            font-size:30px;
            margin-bottom:25px;
        }

        .actions{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .action-btn{
            background:#b30000;
            color:white;
            padding:25px;
            border-radius:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .action-btn:hover{
            transform:translateY(-5px);
            background:#d40000;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            Nexora
        </div>

        <div class="menu">

            <a href="#">
                Dashboard
            </a>

            <a href="#">
                Schools
            </a>

            <a href="#">
                Teachers
            </a>

            <a href="#">
                Students
            </a>

            <a href="#">
                Courses
            </a>

            <a href="#">
                CBT Exams
            </a>

            <a href="#">
                Payments
            </a>

            <a href="#">
                Settings
            </a>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="top">

            <h1>
                Admin Dashboard
            </h1>

            <div>
                👑 Super Admin
            </div>

        </div>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">

                <h2>24</h2>

                <p>Total Schools</p>

            </div>

            <div class="card">

                <h2>420</h2>

                <p>Total Teachers</p>

            </div>

            <div class="card">

                <h2>8,540</h2>

                <p>Total Students</p>

            </div>

            <div class="card">

                <h2>₦2.4M</h2>

                <p>Monthly Revenue</p>

            </div>

        </div>

        <!-- QUICK ACTIONS -->

        <div class="section">

            <div class="section-title">
                Quick Actions
            </div>

            <div class="actions">

                <div class="action-btn">
                    + Add School
                </div>

                <div class="action-btn">
                    + Add Teacher
                </div>

                <div class="action-btn">
                    + Add Student
                </div>

                <div class="action-btn">
                    + Create CBT
                </div>

            </div>

        </div>

    </div>

</body>
  </html>
