<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#071739;
    color:white;
    padding:20px;
}

.top{
    margin-bottom:30px;
}

.top h1{
    font-size:35px;
}

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#13264d;
    padding:25px;
    border-radius:20px;
}

.card h2{
    font-size:18px;
    color:#8fb3ff;
    margin-bottom:10px;
}

.number{
    font-size:40px;
    font-weight:bold;
}

.section{
    margin-top:40px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    padding:15px;
    background:#13264d;
    border-bottom:1px solid #1e3b70;
    text-align:left;
}

.logout{
    display:inline-block;
    margin-top:30px;
    background:red;
    color:white;
    text-decoration:none;
    padding:14px 20px;
    border-radius:12px;
}

</style>
</head>
<body>

<div class="top">
    <h1>👑 Admin Dashboard</h1>
    <p>Welcome, {{ user }}</p>
</div>

<div class="cards">

    <div class="card">
        <h2>Total Students</h2>
        <div class="number">
            {{ students }}
        </div>
    </div>

    <div class="card">
        <h2>Total Teachers</h2>
        <div class="number">
            {{ teachers }}
        </div>
    </div>

    <div class="card">
        <h2>Homework Uploaded</h2>
        <div class="number">
            {{ homework_count }}
        </div>
    </div>

    <div class="card">
        <h2>Results Uploaded</h2>
        <div class="number">
            {{ results_count }}
        </div>
    </div>

</div>

<a href="/logout" class="logout">
Logout
</a>

</body>
</html>
